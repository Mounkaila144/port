# /etc/nginx/sites-available/agency.ptrniger.com.conf
# Story 5.7 — strict CSP with nonce is enforced inside the Next app via
# middleware (lib/csp.ts placeholder). This config covers TLS, www→apex,
# static asset paths, Umami reverse proxy, and HSTS.

# www → apex
server {
    listen 80;
    listen 443 ssl http2;
    server_name www.agency.ptrniger.com;

    # ssl_certificate    /etc/letsencrypt/live/agency.ptrniger.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/agency.ptrniger.com/privkey.pem;

    return 301 https://agency.ptrniger.com$request_uri;
}

# Apex
server {
    listen 80;
    server_name agency.ptrniger.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name agency.ptrniger.com;

    ssl_certificate    /etc/letsencrypt/live/agency.ptrniger.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agency.ptrniger.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    root /var/www/agency.ptrniger.com;

    # Static assets served by Nginx for cache headers
    location /_next/static/ {
        alias /var/www/agency.ptrniger.com/.next/static/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /icons/devicons/ {
        alias /var/www/agency.ptrniger.com/public/icons/devicons/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /image/ {
        alias /var/www/agency.ptrniger.com/public/image/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /project/ {
        alias /var/www/agency.ptrniger.com/public/project/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /logos/ {
        alias /var/www/agency.ptrniger.com/public/logos/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Umami — self-hosted, same-origin
    location /umami/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # App
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
