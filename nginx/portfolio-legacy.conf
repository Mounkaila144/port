# Legacy domain — redirect-only (Story 5.9, AD-026, FR-070/121).
# Keep this server alive on its existing host for ≥12 months post-launch.

map $request_uri $agency_target {
    default                                    "https://agency.ptrniger.com/en$request_uri";
    ~^/fr(/.*)?$                               "https://agency.ptrniger.com/fr$1";
    ~^/en(/.*)?$                               "https://agency.ptrniger.com/en$1";
    ~^/projets(/.*)?$                          "https://agency.ptrniger.com/fr/realisations$1";
    ~^/projects(/.*)?$                         "https://agency.ptrniger.com/en/work$1";
    ~^/realisations(/.*)?$                     "https://agency.ptrniger.com/fr/realisations$1";
    ~^/about(/.*)?$                            "https://agency.ptrniger.com/en/about$1";
    ~^/a-propos(/.*)?$                         "https://agency.ptrniger.com/fr/a-propos$1";
    ~^/services(/.*)?$                         "https://agency.ptrniger.com/en/services$1";
    ~^/contact(/.*)?$                          "https://agency.ptrniger.com/en/contact$1";
    ~^/case-studies/(.+)$                      "https://agency.ptrniger.com/en/case-studies/$1";
    ~^/etudes-de-cas/(.+)$                     "https://agency.ptrniger.com/fr/etudes-de-cas/$1";
    ~^/skills(/.*)?$                           "https://agency.ptrniger.com/en/about";
    ~^/competences(/.*)?$                      "https://agency.ptrniger.com/fr/a-propos";
}

server {
    listen 80;
    listen 443 ssl http2;
    server_name portfolio.nigerdev.com;

    # ssl_certificate    /etc/letsencrypt/live/portfolio.nigerdev.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/portfolio.nigerdev.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        return 301 $agency_target;
    }
}
