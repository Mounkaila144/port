# Story 5.5 — Umami self-hosted (AD-007/AD-013).
# Run on the VPS in /opt/umami:
#   docker compose -f docker-compose.umami.yml up -d
# Reverse-proxy via Nginx /umami/ on the agency host (see agency.conf).

services:
  umami-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:?set UMAMI_DB_PASSWORD}
    volumes:
      - umami-db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:?set UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:?set UMAMI_APP_SECRET}
      DISABLE_TELEMETRY: "1"
    depends_on:
      umami-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped

volumes:
  umami-db:
